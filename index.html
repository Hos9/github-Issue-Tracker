<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Logo -->
    <title>GitHub Issue Tracker | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind + Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Style File -->
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <section class="min-h-screen flex items-center justify-center">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-sm border p-4 mx-auto"
      >
        <div class="login-pannel text-center">
          <img class="mx-auto pb-6" src="./assets/github-logo.png" alt="" />
          <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
          <p class="text-base-500">Sign in to manage your issues</p>
        </div>
        <legend class="fieldset-legend"></legend>

        <label class="label">Username</label>
        <input
          id="input-username"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        />
        <p class="text-primary">Default: admin</p>

        <label class="label">Password</label>
        <input
          id="input-pw"
          type="password"
          class="input w-full"
          placeholder="Enter Password"
        />
        <p class="text-primary">Default: admin123</p>

        <button id="login-btn" class="btn btn-primary mt-4">Login</button>

        <!-- Demo Credentials -->
        <div class="relative border-t-1 border-gray-300 my-5">
          <p class="text-center bg-base-200 absolute -top-4 left-1/2 p-2">OR</p>
          <p class="text-center mt-6 text-gray-400">Demo Credentials:</p>
          <div class="text-center bg-slate-100 p-6 mt-2">
            <p class="text-gray-400">
              <span class="font-bold">Username:</span> admin
            </p>
            <p class="text-gray-400">
              <span class="font-bold">Password:</span> admin123
            </p>
          </div>
        </div>
      </fieldset>
    </section>

    <script src="./scripts/login.js"></script>
    <script src="./scripts/index.js"></script>
  </body>
</html>
