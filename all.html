<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Logo -->
    <title>GitHub Issue Tracker | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind + Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Style File -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-base-200">
    <!-- NAVBAR -->
    <section id="navbar" class="max-w-400 w-11/12 mx-auto">
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex gap-2 items-center leading-8 flex-1">
          <img class="h-10" src="./assets/github-logo.png" alt="" />
          <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
          <input
            id="inputSearch"
            type="text"
            placeholder="🔍 Search Issues..."
            class="input input-bordered w-24 md:w-auto"
          />
          <button
            onclick="setActive(id)"
            id="issueSearchBtn"
            class="btn btn-primary"
          >
            Search
          </button>
          <div class="dropdown dropdown-end">
            <div
              tabindex="0"
              role="button"
              class="btn btn-ghost btn-circle avatar"
            >
              <!-- <div class="w-10 rounded-full">
                <img
                  alt="Tailwind CSS Navbar component"
                  src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
                />
              </div> -->
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a class="justify-between">
                  Profile
                  <span id="profile-name" class="badge"></span>
                </a>
              </li>
              <li><a href="./index.html">Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </section>

    <!-- SWITCHES -->
    <section
      id="switches-container"
      class="max-w-7xl w-10/12 mx-auto mt-16 mb-4 bg-white"
    >
      <div
        id=""
        class="felx gap-2 gap-y-2 p-6 border border-gray-100 shadow-sm"
      >
        <button
          onclick="setActive(id)"
          id="allBtn"
          class="btn_cmn switch btn btn-primary w-30"
        >
          All
        </button>
        <button
          onclick="setActive(id)"
          id="openBtn"
          class="btn_cmn switch btn w-30 font-medium"
        >
          Open
        </button>
        <button
          onclick="setActive(id)"
          id="closeBtn"
          class="btn_cmn switch btn w-30 font-medium"
        >
          Close
        </button>
      </div>
    </section>

    <!-- Issues Count -->
    <section
      id="issues-count"
      class="p-6 max-w-7xl w-10/12 mx-auto bg-white border border-gray-100 shadow-sm"
    >
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
          <div>
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 class="font-semibold text-xl">
              <span id="counts">0</span> Issues
            </h2>
            <p class="text-gray-400">Track and manage your project issues</p>
          </div>
        </div>
        <div>
          <p>
            <span
              ><i
                class="fa-solid fa-circle"
                style="color: rgb(49, 187, 37)"
              ></i>
              Open</span
            >
            <span
              ><i
                class="fa-solid fa-circle"
                style="color: rgb(122, 99, 236)"
              ></i>
              close</span
            >
          </p>
        </div>
      </div>
    </section>

    <!-- Issues Container -->
    <section
      id="issue-container"
      class="max-w-7xl w-10/12 mx-auto bg-white grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 mt-7"
    ></section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="card_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="modal-container"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./scripts/index.js"></script>
    <script src="./scripts/login.js"></script>
  </body>
</html>
